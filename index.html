<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>

    <script>


        alert(" Welcome to JS \n Lets add 2 numbers");

        // \n new line in js 

        let num1 = prompt("Enter first number");
        let num2 = prompt("Enter second number");

        // change string to Number 
        num1 = Number(num1);
        num2 = Number(num2);


        // all answers in one alert with new line 
        alert("Addition: " + (num1 + num2) + "\n" + "Subtraction: " + (num1 - num2) + "\n" + "Multiplication: " + (num1 * num2) + "\n" + "Division: " + (num1 / num2));

        */




    </script>
